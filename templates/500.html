{% extends "base.html" %}
{% block title %}Server Error — Eventify{% endblock %}
{% block content %}
<div style="min-height:78vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:3rem 1rem;">
  <div class="fade-up">
    <div style="font-family:'Syne',sans-serif;font-size:clamp(6rem,18vw,10rem);font-weight:800;line-height:1;background:linear-gradient(135deg,var(--warning),rgba(255,190,11,.25));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px;letter-spacing:-4px;">500</div>
    <div style="font-size:3rem;margin-bottom:16px;">⚙️</div>
    <h2 style="font-size:1.75rem;margin-bottom:10px;">Something went wrong</h2>
    <p style="color:var(--muted);max-width:400px;margin:0 auto 28px;line-height:1.7;font-size:.95rem;">Our servers hit an unexpected error. We've been notified and are working on a fix.</p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a href="{% url 'home' %}" class="btn-brand" style="padding:11px 24px;"><i class="bi bi-house-fill"></i>Go Home</a>
      <button onclick="location.reload()" class="btn-outline-brand" style="padding:11px 24px;"><i class="bi bi-arrow-clockwise"></i>Try Again</button>
    </div>
  </div>
</div>
{% endblock %}
