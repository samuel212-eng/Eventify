{% extends "base.html" %}
{% block title %}Leave Waitlist — Eventify{% endblock %}
{% block content %}
<div class="container my-5" style="max-width:460px;">
  <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:2.5rem;text-align:center;">
    <div style="font-size:3rem;margin-bottom:1rem;">⏳</div>
    <h2 style="margin-bottom:.75rem;">Leave the Waitlist?</h2>
    <p style="color:var(--muted);margin-bottom:2rem;">
      You'll lose your place in the queue for
      <strong style="color:var(--text);">{{ event.title }}</strong>.
    </p>
    <form method="POST" class="d-flex gap-3 justify-content-center">
      {% csrf_token %}
      <button type="submit" class="btn btn-brand btn-sm" style="padding:.65rem 1.8rem;">Yes, Leave</button>


      <a href="{% url 'event_detail' event.slug %}" class="btn btn-outline-brand btn-sm">Keep My Spot</a>
    </form>
  </div>
</div>
{% endblock %}
